<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario · Video Agency Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
  .page-title { font-family: var(--font-display); font-size: 24px; margin-bottom: 6px; }

  .filter-bar { margin: 18px 0; }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .month-nav h2 {
    font-family: var(--font-display);
    font-size: 18px;
    text-transform: capitalize;
    margin: 0;
  }
  .month-nav-btns { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  .weekday-row, .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .weekday-row {
    margin-bottom: 6px;
  }
  .weekday-label {
    text-align: center;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .day-cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    position: relative;
  }
  .day-cell.empty { background: transparent; border: none; cursor: default; }
  .day-cell.today { border-color: var(--accent); }
  .day-cell.selected { background: var(--surface-raised); border-color: var(--accent); border-width: 2px; }
  .day-num {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-dim);
  }
  .day-cell.today .day-num { color: var(--accent); font-weight: 600; }
  .dots-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: auto;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-shoot { background: var(--accent); }
  .dot-VELOCE { background: var(--success); }
  .dot-MEDIO { background: var(--warning); }
  .dot-IMPEGNATIVO { background: var(--danger); }
  .dot-online { background: #6FA8DC; }

  .agenda-title {
    font-family: var(--font-display);
    font-size: 16px;
    margin: 24px 0 12px;
    text-transform: capitalize;
  }
  .agenda-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-icon {
    width: 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .agenda-icon.shoot { background: var(--accent); }
  .agenda-icon.VELOCE { background: var(--success); }
  .agenda-icon.MEDIO { background: var(--warning); }
  .agenda-icon.IMPEGNATIVO { background: var(--danger); }
  .agenda-icon.online { background: #6FA8DC; }
  .agenda-item-title { font-weight: 600; font-size: 14px; }
  .agenda-item-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
  }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
</style>
</head>
<body>

<div class="wrap page-content">
  <h1 class="page-title">Calendario</h1>
  <p style="color:var(--text-dim); margin-bottom: 16px;">Shooting e montaggi, giorno per giorno</p>

  <div class="filter-bar">
    <div class="field" style="margin-bottom:0;">
      <label for="person-filter">Filtra per persona</label>
      <select id="person-filter">
        <option value="">Tutti</option>
      </select>
    </div>
  </div>

  <div class="month-nav">
    <button class="icon-btn" id="prev-month">‹</button>
    <h2 id="month-label">—</h2>
    <button class="icon-btn" id="next-month">›</button>
  </div>

  <div class="weekday-row">
    <div class="weekday-label">Lun</div><div class="weekday-label">Mar</div><div class="weekday-label">Mer</div>
    <div class="weekday-label">Gio</div><div class="weekday-label">Ven</div><div class="weekday-label">Sab</div>
    <div class="weekday-label">Dom</div>
  </div>
  <div class="day-grid" id="day-grid"></div>

  <div class="legend">
    <span><span class="dot dot-shoot"></span> Shooting</span>
    <span><span class="dot dot-VELOCE"></span> Montaggio veloce</span>
    <span><span class="dot dot-MEDIO"></span> Montaggio medio</span>
    <span><span class="dot dot-IMPEGNATIVO"></span> Montaggio impegnativo</span>
    <span><span class="dot dot-online"></span> Va online</span>
  </div>

  <h3 class="agenda-title" id="agenda-title">Oggi</h3>
  <div id="agenda-list">
    <p style="color:var(--text-dim); font-size:14px;">Caricamento...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
  let currentProfile = null;
  let viewedYear, viewedMonth; // mese 0-11
  let selectedDateStr;
  let dayData = {}; // { "yyyy-mm-dd": { shootings: [], editing: [], publish: [] } }

  const todayStr = toISODate(new Date());

  (async () => {
    await requireAuth();
    currentProfile = await getCurrentProfile();
    if (!currentProfile) return;

    renderShell(currentProfile, "calendar");

    const today = new Date();
    viewedYear = today.getFullYear();
    viewedMonth = today.getMonth();
    selectedDateStr = todayStr;

    await loadPeopleFilter();
    document.getElementById("person-filter").addEventListener("change", loadMonthData);
    document.getElementById("prev-month").addEventListener("click", () => changeMonth(-1));
    document.getElementById("next-month").addEventListener("click", () => changeMonth(1));

    loadMonthData();
  })();

  function toISODate(d) {
    return d.toISOString().slice(0, 10);
  }

  function changeMonth(delta) {
    viewedMonth += delta;
    if (viewedMonth < 0) { viewedMonth = 11; viewedYear--; }
    if (viewedMonth > 11) { viewedMonth = 0; viewedYear++; }
    loadMonthData();
  }

  async function loadPeopleFilter() {
    const { data } = await supabaseClient
      .from("profiles")
      .select("id, full_name, role")
      .in("role", ["project_manager", "operatore"])
      .order("full_name");

    const select = document.getElementById("person-filter");
    (data || []).forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.full_name;
      select.appendChild(opt);
    });

    // Se l'utente loggato è un operatore, filtra di default su se stesso
    if (currentProfile.role === "operatore") {
      select.value = currentProfile.id;
    }
  }

  async function loadMonthData() {
    const monthLabel = new Date(viewedYear, viewedMonth, 1)
      .toLocaleDateString("it-IT", { month: "long", year: "numeric" });
    document.getElementById("month-label").textContent = monthLabel;

    const rangeStart = toISODate(new Date(viewedYear, viewedMonth, 1));
    const rangeEnd = toISODate(new Date(viewedYear, viewedMonth + 1, 0));
    const filterId = document.getElementById("person-filter").value;

    dayData = {};

    // --- Shooting nel mese ---
    const { data: shoots } = await supabaseClient
      .from("shootings")
      .select("*, projects(client_name), shooting_participants(profile_id, profiles(full_name))")
      .gte("shoot_date", rangeStart)
      .lte("shoot_date", rangeEnd);

    (shoots || []).forEach(s => {
      const participantIds = (s.shooting_participants || []).map(p => p.profile_id);
      if (filterId && !participantIds.includes(filterId)) return;
      addToDay(s.shoot_date, "shootings", s);
    });

    // --- Montaggi in corso nel mese (overlap tra assigned_date e review_due_date) ---
    const { data: editing } = await supabaseClient
      .from("video_products")
      .select("*, projects(client_name), profiles:assigned_to(full_name)")
      .lte("assigned_date", rangeEnd)
      .gte("review_due_date", rangeStart);

    (editing || []).forEach(p => {
      if (filterId && p.assigned_to !== filterId) return;
      const start = p.assigned_date > rangeStart ? p.assigned_date : rangeStart;
      const end = p.review_due_date < rangeEnd ? p.review_due_date : rangeEnd;
      eachDate(start, end, (d) => addToDay(d, "editing", p));
    });

    // --- Uscite online nel mese ---
    const { data: publishing } = await supabaseClient
      .from("video_products")
      .select("*, projects(client_name), profiles:assigned_to(full_name)")
      .gte("publish_date", rangeStart)
      .lte("publish_date", rangeEnd);

    (publishing || []).forEach(p => {
      if (filterId && p.assigned_to !== filterId) return;
      addToDay(p.publish_date, "publish", p);
    });

    renderGrid();
    renderAgenda(selectedDateStr);
  }

  function addToDay(dateStr, key, item) {
    if (!dayData[dateStr]) dayData[dateStr] = { shootings: [], editing: [], publish: [] };
    dayData[dateStr][key].push(item);
  }

  function eachDate(startStr, endStr, callback) {
    let d = new Date(startStr);
    const end = new Date(endStr);
    while (d <= end) {
      callback(toISODate(d));
      d.setDate(d.getDate() + 1);
    }
  }

  function renderGrid() {
    const grid = document.getElementById("day-grid");
    const firstDay = new Date(viewedYear, viewedMonth, 1);
    const daysInMonth = new Date(viewedYear, viewedMonth + 1, 0).getDate();
    const startWeekday = (firstDay.getDay() + 6) % 7; // lunedì = 0

    let html = "";
    for (let i = 0; i < startWeekday; i++) html += `<div class="day-cell empty"></div>`;

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = toISODate(new Date(viewedYear, viewedMonth, day));
      const data = dayData[dateStr] || { shootings: [], editing: [], publish: [] };

      let classes = "day-cell";
      if (dateStr === todayStr) classes += " today";
      if (dateStr === selectedDateStr) classes += " selected";

      const difficulties = [...new Set(data.editing.map(p => p.difficulty))];
      let dots = "";
      if (data.shootings.length) dots += `<span class="dot dot-shoot"></span>`;
      difficulties.slice(0, 2).forEach(diff => dots += `<span class="dot dot-${diff}"></span>`);
      if (data.publish.length) dots += `<span class="dot dot-online"></span>`;

      html += `
        <div class="${classes}" data-date="${dateStr}">
          <span class="day-num">${day}</span>
          <div class="dots-row">${dots}</div>
        </div>
      `;
    }

    grid.innerHTML = html;
    grid.querySelectorAll(".day-cell:not(.empty)").forEach(cell => {
      cell.addEventListener("click", () => {
        selectedDateStr = cell.dataset.date;
        renderGrid();
        renderAgenda(selectedDateStr);
      });
    });
  }

  function renderAgenda(dateStr) {
    const title = document.getElementById("agenda-title");
    const niceDate = new Date(dateStr).toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });
    title.textContent = dateStr === todayStr ? `Oggi · ${niceDate}` : niceDate;

    const data = dayData[dateStr] || { shootings: [], editing: [], publish: [] };
    const container = document.getElementById("agenda-list");

    const items = [];

    data.shootings.forEach(s => {
      const names = (s.shooting_participants || []).map(p => p.profiles?.full_name).filter(Boolean).join(", ");
      items.push(`
        <div class="agenda-item">
          <div class="agenda-icon shoot"></div>
          <div>
            <div class="agenda-item-title">🎬 ${s.shoot_name}</div>
            <div class="agenda-item-sub">
              ${s.projects ? s.projects.client_name : "—"} · ${s.call_time} · ${s.location}<br>
              Durata: ${s.duration_hours} ore · Convocati: ${names || "—"}
            </div>
          </div>
        </div>
      `);
    });

    data.editing.forEach(p => {
      items.push(`
        <div class="agenda-item">
          <div class="agenda-icon ${p.difficulty}"></div>
          <div>
            <div class="agenda-item-title">✂️ ${p.product_name}</div>
            <div class="agenda-item-sub">
              ${p.projects ? p.projects.client_name : "—"} · ${p.profiles ? p.profiles.full_name : "—"}<br>
              Difficoltà: ${p.difficulty} · Revisione entro: ${formatDate(p.review_due_date)}
            </div>
          </div>
        </div>
      `);
    });

    data.publish.forEach(p => {
      items.push(`
        <div class="agenda-item">
          <div class="agenda-icon online"></div>
          <div>
            <div class="agenda-item-title">🚀 ${p.product_name} va online</div>
            <div class="agenda-item-sub">
              ${p.projects ? p.projects.client_name : "—"} · ${p.profiles ? p.profiles.full_name : "—"}
            </div>
          </div>
        </div>
      `);
    });

    container.innerHTML = items.length
      ? items.join("")
      : `<p style="color:var(--text-dim); font-size:14px;">Nessun impegno in questo giorno.</p>`;
  }

  function formatDate(d) {
    if (!d) return "—";
    return new Date(d).toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit" });
  }
</script>
</body>
</html>
