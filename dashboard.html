<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Video Agency Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  .wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
  .welcome h1 { font-family: var(--font-display); font-size: 26px; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="wrap page-content">
  <div class="welcome">
    <h1 id="welcome-name">Ciao 👋</h1>
    <p style="color:var(--text-dim)">Il tuo spazio di lavoro</p>
    <span class="tag" id="role-tag">RUOLO</span>
  </div>

  <div id="alerts-section" style="margin-top:28px; display:none;">
    <div class="section-title">Alert contrattuali</div>
    <div id="alerts-list"></div>
  </div>

  <div id="admin-shortcuts" style="display:none; margin-top:28px;">
    <div class="section-title">Strumenti admin</div>
    <a href="projects.html" class="card" style="display:block; margin-bottom:12px; text-decoration:none;">
      <div class="list-row-title">Gestisci progetti e contratti</div>
      <div class="list-row-sub">Crea nuovi clienti, definisci il perimetro contrattuale</div>
    </a>
    <a href="team.html" class="card" style="display:block; text-decoration:none;">
      <div class="list-row-title">Gestisci il team</div>
      <div class="list-row-sub">Aggiungi project manager e operatori</div>
    </a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
  (async () => {
    await requireAuth();
    const profile = await getCurrentProfile();

    if (!profile) {
      document.getElementById("welcome-name").textContent = "Profilo non trovato";
      document.getElementById("role-tag").textContent = "Contatta l'admin";
      return;
    }

    renderShell(profile, "dashboard");

    document.getElementById("welcome-name").textContent = `Ciao, ${profile.full_name} 👋`;
    const roleTag = document.getElementById("role-tag");
    roleTag.textContent = profile.role.replace("_", " ").toUpperCase();
    roleTag.classList.add(profile.role === "admin" ? "tag-admin" : profile.role === "project_manager" ? "tag-pm" : "tag-operatore");

    if (profile.role === "admin") {
      document.getElementById("admin-shortcuts").style.display = "block";
    }

    if (profile.role === "admin" || profile.role === "project_manager") {
      loadContractAlerts(profile);
    }
  })();

  async function loadContractAlerts(profile) {
    let projectsQuery = supabaseClient.from("projects").select("*");
    if (profile.role === "project_manager") {
      projectsQuery = projectsQuery.eq("project_manager_id", profile.id);
    }

    const [{ data: projects }, { data: shootingsData }, { data: videosData }] = await Promise.all([
      projectsQuery,
      supabaseClient.from("shootings").select("project_id"),
      supabaseClient.from("video_products").select("project_id"),
    ]);

    if (!projects || !projects.length) return;

    const countByProject = (rows, projectId) => (rows || []).filter(r => r.project_id === projectId).length;
    const alerts = [];

    projects.forEach(p => {
      const outputsUsed = countByProject(shootingsData, p.id);
      const videosUsed = countByProject(videosData, p.id);
      checkAlert(alerts, p, "Uscite", outputsUsed, p.expected_outputs_count, p.expected_outputs_type);
      checkAlert(alerts, p, "Prodotti video", videosUsed, p.expected_videos_count, p.expected_videos_type);
    });

    if (!alerts.length) return;

    document.getElementById("alerts-section").style.display = "block";
    document.getElementById("alerts-list").innerHTML = alerts.map(a => `
      <div class="alert-banner ${a.level}" style="margin-top:10px;">
        ${a.level === "danger" ? "🚨" : "⚠️"} <strong>${a.clientName}</strong> — ${a.message}
      </div>
    `).join("");
  }

  function checkAlert(alerts, project, label, used, expected, type) {
    if (!expected || expected <= 0) return;
    const pct = Math.round((used / expected) * 100);
    if (pct >= 100) {
      alerts.push({ level: "danger", clientName: project.client_name, message: `${label.toLowerCase()} esaurite: ${used}/${expected} ${type}` });
    } else if (pct >= 70) {
      alerts.push({ level: "warning", clientName: project.client_name, message: `${pct}% delle ${label.toLowerCase()} usate (${used}/${expected} ${type})` });
    }
  }
</script>
</body>
</html>
