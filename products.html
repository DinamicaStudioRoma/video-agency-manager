<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prodotti video · Video Agency Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#14161b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  .wrap { max-width: 720px; margin: 0 auto; padding-top: 32px; padding-left: 20px; padding-right: 20px; }
  .page-title { font-family: var(--font-display); font-size: 24px; margin-bottom: 6px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .row-2 { grid-template-columns: 1fr; } }
  .diff-badge { font-size: 11px; font-family: var(--font-mono); text-transform: uppercase; padding: 3px 8px; border-radius: 5px; }
  .diff-VELOCE { color: var(--success); background: rgba(79,174,126,0.12); border: 1px solid rgba(79,174,126,0.4); }
  .diff-MEDIO { color: var(--warning); background: rgba(224,169,62,0.12); border: 1px solid rgba(224,169,62,0.4); }
  .diff-IMPEGNATIVO { color: var(--danger); background: rgba(224,82,76,0.12); border: 1px solid rgba(224,82,76,0.4); }
</style>
</head>
<body>

<div class="wrap page-content">
  <h1 class="page-title">Prodotti video</h1>
  <p style="color:var(--text-dim); margin-bottom: 24px;">Assegna montaggi e consegne</p>

  <div class="card">
    <form id="product-form">
      <div class="field">
        <label for="project_id">Cliente e contratto di riferimento *</label>
        <select id="project_id" required>
          <option value="">Caricamento...</option>
        </select>
      </div>

      <div class="field">
        <label for="product_name">Nome del prodotto / format *</label>
        <input type="text" id="product_name" required placeholder="es. Reel lancio prodotto, Recap evento...">
      </div>

      <div class="field">
        <label for="assigned_to">Assegnato a (operatore) *</label>
        <select id="assigned_to" required>
          <option value="">Caricamento...</option>
        </select>
      </div>

      <div class="row-2">
        <div class="field">
          <label for="review_due_date">Pronto per revisione il *</label>
          <input type="date" id="review_due_date" required>
        </div>
        <div class="field">
          <label for="publish_date">Va online il *</label>
          <input type="date" id="publish_date" required>
        </div>
      </div>

      <div class="field">
        <label for="work_hours">Ore di lavorazione *</label>
        <select id="work_hours" required>
          <option value="">Seleziona...</option>
        </select>
      </div>

      <div class="field">
        <label for="difficulty">Difficoltà *</label>
        <select id="difficulty" required>
          <option value="">Seleziona...</option>
          <option value="VELOCE">Veloce</option>
          <option value="MEDIO">Medio</option>
          <option value="IMPEGNATIVO">Impegnativo</option>
        </select>
      </div>

      <div class="field">
        <label for="script">Script</label>
        <textarea id="script" rows="2" placeholder="Spazio libero..."></textarea>
      </div>
      <div class="field">
        <label for="reference">Reference</label>
        <textarea id="reference" rows="2" placeholder="Spazio libero..."></textarea>
      </div>
      <div class="field">
        <label for="notes">Note</label>
        <textarea id="notes" rows="2" placeholder="Spazio libero..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%; margin-top:8px;">Assegna prodotto</button>
      <p class="error-msg" id="error-msg"></p>
      <p class="success-msg" id="success-msg"></p>
    </form>
  </div>

  <div id="conflict-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>⚠️ Attenzione</h3>
      <p id="conflict-message"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="conflict-cancel">Annulla</button>
        <button class="btn btn-primary" id="conflict-confirm">Assegna comunque</button>
      </div>
    </div>
  </div>

  <div class="section-title">Prodotti in corso</div>
  <div id="products-list">
    <p style="color:var(--text-dim); font-size:14px;">Caricamento...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
  let currentProfile = null;

  (async () => {
    await requireAuth();
    currentProfile = await getCurrentProfile();
    if (!requireRole(currentProfile, ["admin", "project_manager"])) return;

    renderShell(currentProfile, "products");
    fillWorkHoursOptions();
    loadProjects();
    loadOperators();
    loadProducts();
  })();

  function fillWorkHoursOptions() {
    const select = document.getElementById("work_hours");
    let html = `<option value="">Seleziona...</option>`;
    for (let h = 1; h <= 20; h++) {
      html += `<option value="${h}">${h} ${h === 1 ? "ora" : "ore"}</option>`;
    }
    select.innerHTML = html;
  }

  async function loadProjects() {
    const { data, error } = await supabaseClient
      .from("projects")
      .select("id, client_name, project_name")
      .order("client_name");

    const select = document.getElementById("project_id");
    if (error || !data.length) {
      select.innerHTML = `<option value="">Nessun progetto — creane uno prima</option>`;
      return;
    }
    select.innerHTML = `<option value="">Seleziona...</option>` +
      data.map(p => `<option value="${p.id}">${p.client_name} — ${p.project_name}</option>`).join("");
  }

  async function loadOperators() {
    const { data, error } = await supabaseClient
      .from("profiles")
      .select("id, full_name")
      .eq("role", "operatore")
      .order("full_name");

    const select = document.getElementById("assigned_to");
    if (error || !data.length) {
      select.innerHTML = `<option value="">Nessun operatore — aggiungilo nel Team</option>`;
      return;
    }
    select.innerHTML = `<option value="">Seleziona...</option>` +
      data.map(o => `<option value="${o.id}">${o.full_name}</option>`).join("");
  }

  async function loadProducts() {
    const { data, error } = await supabaseClient
      .from("video_products")
      .select("*, projects(client_name), profiles:assigned_to(full_name)");

    const container = document.getElementById("products-list");
    if (error) {
      container.innerHTML = `<p class="error-msg">Errore: ${error.message}</p>`;
      return;
    }
    if (!data.length) {
      container.innerHTML = `<div class="card"><p style="color:var(--text-dim); font-size:14px;">Nessun prodotto assegnato ancora.</p></div>`;
      return;
    }

    const todayStr = toISODate(new Date());
    const upcoming = data.filter(p => p.review_due_date >= todayStr);
    const done = data.filter(p => p.review_due_date < todayStr);

    upcoming.sort((a, b) => a.review_due_date.localeCompare(b.review_due_date));
    done.sort((a, b) => b.review_due_date.localeCompare(a.review_due_date));

    const renderCard = (p) => `
      <div class="card" style="margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div class="list-row-title">${p.product_name}</div>
          <span class="diff-badge diff-${p.difficulty}">${p.difficulty}</span>
        </div>
        <div class="card-meta">
          <span>🏛️ ${p.projects ? p.projects.client_name : "—"}</span>
          <span>📅 Revisione: ${formatDate(p.review_due_date)}</span>
        </div>
        <div class="list-row-sub">
          Assegnato a: ${p.profiles ? p.profiles.full_name : "—"} <span class="status-badge status-${p.assignment_status}">${p.assignment_status}</span><br>
          Online: ${formatDate(p.publish_date)} · Ore di lavorazione: ${p.work_hours} ${p.work_hours === 1 ? "ora" : "ore"}
        </div>
      </div>
    `;

    let html = `<div class="section-title" style="margin-top:0;">Da svolgere (${upcoming.length})</div>`;
    html += upcoming.length
      ? upcoming.map(renderCard).join("")
      : `<p style="color:var(--text-dim); font-size:14px;">Nessun prodotto in corso.</p>`;

    html += `<div class="section-title">Completati (${done.length})</div>`;
    html += done.length
      ? done.map(renderCard).join("")
      : `<p style="color:var(--text-dim); font-size:14px;">Nessun prodotto completato ancora.</p>`;

    container.innerHTML = html;
  }

  function toISODate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function formatDate(d) {
    if (!d) return "—";
    return new Date(d).toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric" });
  }

  function toISODateGeneric(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function parseLocalDate(str) {
    const [y, m, d] = str.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function getDateRange(startStr, endStr) {
    const dates = [];
    let d = parseLocalDate(startStr);
    const end = parseLocalDate(endStr || startStr);
    while (d <= end) {
      dates.push(toISODateGeneric(d));
      d.setDate(d.getDate() + 1);
    }
    return dates;
  }

  // Controlla se l'operatore assegnato ha già uno shooting/prodotto o è OFF nelle date chiave (revisione, online)
  async function findConflicts(assignedTo, dateList) {
    const conflicts = [];

    const [{ data: shoots }, { data: products }, { data: offs }] = await Promise.all([
      supabaseClient.from("shootings").select("shoot_date, shoot_end_date, shoot_name, projects(client_name), shooting_participants(profile_id)"),
      supabaseClient.from("video_products").select("review_due_date, publish_date, product_name, assigned_to, projects(client_name)"),
      supabaseClient.from("days_off").select("profile_id, off_date"),
    ]);

    const personName = document.getElementById("assigned_to").selectedOptions[0]?.textContent || "La persona assegnata";

    (shoots || []).forEach(s => {
      const isParticipant = (s.shooting_participants || []).some(p => p.profile_id === assignedTo);
      if (!isParticipant) return;
      const span = getDateRange(s.shoot_date, s.shoot_end_date || s.shoot_date);
      if (dateList.some(d => span.includes(d))) {
        conflicts.push(`${personName} ha già lo shooting "${s.shoot_name}" di ${s.projects?.client_name || "—"} in quei giorni.`);
      }
    });

    (products || []).forEach(p => {
      if (p.assigned_to !== assignedTo) return;
      if (dateList.includes(p.review_due_date) || dateList.includes(p.publish_date)) {
        conflicts.push(`${personName} ha già una consegna prodotto ("${p.product_name}") di ${p.projects?.client_name || "—"} in quei giorni.`);
      }
    });

    (offs || []).forEach(o => {
      if (o.profile_id !== assignedTo) return;
      if (dateList.includes(o.off_date)) {
        conflicts.push(`${personName} è OFF il ${formatDate(o.off_date)}.`);
      }
    });

    return [...new Set(conflicts)];
  }

  document.getElementById("product-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorMsg = document.getElementById("error-msg");
    const successMsg = document.getElementById("success-msg");
    errorMsg.textContent = "";
    successMsg.textContent = "";

    const payload = {
      project_id: document.getElementById("project_id").value,
      product_name: document.getElementById("product_name").value.trim(),
      assigned_to: document.getElementById("assigned_to").value,
      review_due_date: document.getElementById("review_due_date").value,
      publish_date: document.getElementById("publish_date").value,
      work_hours: parseInt(document.getElementById("work_hours").value),
      difficulty: document.getElementById("difficulty").value,
      script: document.getElementById("script").value.trim() || null,
      reference: document.getElementById("reference").value.trim() || null,
      notes: document.getElementById("notes").value.trim() || null,
      created_by: currentProfile.id,
      // assigned_date si compila da sola (default nel database = data di oggi)
    };

    if (!payload.project_id || !payload.assigned_to || !payload.work_hours) {
      errorMsg.textContent = "Compila tutti i campi obbligatori.";
      return;
    }

    const dateList = [...new Set([payload.review_due_date, payload.publish_date])];
    const conflicts = await findConflicts(payload.assigned_to, dateList);

    if (conflicts.length > 0) {
      document.getElementById("conflict-message").innerHTML = "Attenzione:<br>" + conflicts.join("<br>") + "<br><br>Vuoi assegnare comunque il prodotto?";
      document.getElementById("conflict-modal").style.display = "flex";

      document.getElementById("conflict-cancel").onclick = () => {
        document.getElementById("conflict-modal").style.display = "none";
      };
      document.getElementById("conflict-confirm").onclick = () => {
        document.getElementById("conflict-modal").style.display = "none";
        submitProduct(payload);
      };
      return;
    }

    submitProduct(payload);
  });

  async function submitProduct(payload) {
    const errorMsg = document.getElementById("error-msg");
    const successMsg = document.getElementById("success-msg");
    const submitBtn = document.getElementById("submit-btn");
    submitBtn.disabled = true;
    submitBtn.textContent = "Assegnazione in corso...";

    const { error } = await supabaseClient.from("video_products").insert(payload);

    submitBtn.disabled = false;
    submitBtn.textContent = "Assegna prodotto";

    if (error) {
      errorMsg.textContent = "Errore: " + error.message;
      return;
    }

    successMsg.textContent = "Prodotto assegnato con successo!";
    document.getElementById("product-form").reset();
    loadProducts();
  }
</script>
</body>
</html>
